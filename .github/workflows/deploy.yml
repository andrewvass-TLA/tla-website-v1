name: Deploy child theme to WP Engine (SFTP)

# Pushes wp-theme/responsiveChild-theme/ to the live WordPress child theme over
# SFTP on every push to main. Targets WP Engine PRODUCTION.
#
# SAFETY: only writes INTO the child-theme folder. Never touches
# wp-content/uploads, plugins, other themes, or the database. Commerce, blog,
# and partner funnels are unaffected. This action uploads/overwrites only — it
# does NOT delete remote files absent locally, so orphaned old-slug partials and
# hand-uploaded *-test.php stay on the server until cleaned up by hand (harmless).
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   WPE_SFTP_HOST        <install>.sftp.wpengine.com   (WP Engine portal -> SFTP)
#   WPE_SFTP_USER        your WP Engine SFTP username   (install-username form)
#   WPE_SFTP_PORT        2222                            (WP Engine uses 2222)
#   WPE_SSH_PRIVATE_KEY  the PRIVATE key (full text) whose PUBLIC half is added
#                        to the WP Engine SSH/SFTP user

on:
  # NOTE: auto-deploy on push is temporarily disabled for the FIRST controlled
  # run. After verifying a manual run works end-to-end, re-enable this block.
  # push:
  #   branches: [main]
  #   paths:
  #     - 'wp-theme/responsiveChild-theme/**'
  #     - '.github/workflows/deploy.yml'
  workflow_dispatch: {} # manual run from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SFTP (WP Engine, SSH key auth)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.WPE_SFTP_HOST }}
          port: ${{ secrets.WPE_SFTP_PORT }}
          username: ${{ secrets.WPE_SFTP_USER }}
          ssh_private_key: ${{ secrets.WPE_SSH_PRIVATE_KEY }}

          # Trailing /* uploads the folder CONTENTS into remote_path.
          local_path: './wp-theme/responsiveChild-theme/*'
          # ABSOLUTE remote path on WP Engine. If this errors with a path / "no
          # such file" error, the install root differs — try:
          #   /sites/<install-name>/wp-content/themes/responsiveChild-theme/
          remote_path: '/wp-content/themes/responsiveChild-theme/'

          sftp_only: true        # use SFTP, not SCP
          delete_remote_files: false   # never delete remote files absent locally
